version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - var_data:/var/www/html/var
      - public_data:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://selftrace:selftrace@db:3306/selftrace?serverVersion=8.0&charset=utf8mb4"
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: "selftrace_secret_change_in_production"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    networks:
      - selftrace

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "6622:80"
    volumes:
      - public_data:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - selftrace

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: selftrace
      MYSQL_USER: selftrace
      MYSQL_PASSWORD: selftrace
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "selftrace", "-pselftrace"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - selftrace

volumes:
  db_data:
  var_data:
  public_data:

networks:
  selftrace:
    driver: bridge
