version: '3.9'

# Automatically loaded alongside docker-compose.yml for local development.
# Do not commit secrets here.

services:
  app:
    volumes:
      - var_data:/var/www/html/var
      - public_data:/var/www/html/public
      # Live source mounts — changes are visible on refresh, no rebuild needed
      - ./src:/var/www/html/src
      - ./templates:/var/www/html/templates
      - ./config:/var/www/html/config
      - ./migrations:/var/www/html/migrations
      - ./assets:/var/www/html/assets
      - ./tailwind.config.js:/var/www/html/tailwind.config.js
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"

  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: selftrace
      PMA_PASSWORD: selftrace
    depends_on:
      - db
    networks:
      - selftrace
